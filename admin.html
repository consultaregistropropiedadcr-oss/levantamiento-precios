<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Consolidado Precios</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .stat-number { font-size: 32px; font-weight: bold; }
        .stat-label { font-size: 14px; opacity: 0.8; margin-top: 4px; }
        .content {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
        }
        .buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-export {
            background: #7c3aed;
            color: white;
        }
        .btn-export:hover {
            background: #6d28d9;
        }
        .btn-reload {
            background: #0891b2;
            color: white;
        }
        .btn-reload:hover {
            background: #0e7490;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        thead {
            background: #334155;
            border-bottom: 2px solid #475569;
        }
        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #334155;
        }
        tbody tr:hover {
            background: rgba(124, 58, 237, 0.1);
        }
        .price {
            color: #4ade80;
            font-weight: 600;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Panel de Administrador</h1>
            <p>Consolidado de Levantamiento de Precios - Aceites</p>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalRegistros">0</div>
                    <div class="stat-label">Total de Registros</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalSupermercados">0</div>
                    <div class="stat-label">Supermercados</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalMarcas">0</div>
                    <div class="stat-label">Marcas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalUsuarios">0</div>
                    <div class="stat-label">Usuarios</div>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="buttons">
                <button class="btn-export" onclick="exportarExcel()">📊 Exportar Excel Corporativo</button>
                <button class="btn-reload" onclick="recargar()">🔄 Recargar Datos</button>
            </div>

            <h3 style="margin-bottom: 16px;">📋 Todos los Registros</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Supermercado</th>
                            <th>Marca</th>
                            <th>900ml (₡)</th>
                            <th>1.5L (₡)</th>
                            <th>3L (₡)</th>
                            <th>Stock Total</th>
                            <th>Usuario</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="tabla">
                        <tr class="empty"><td colspan="8">Cargando datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAXZBODHmBZ55pbnuskIGOJJDkKirSRM0c",
            authDomain: "levantamiento-precios.firebaseapp.com",
            databaseURL: "https://levantamiento-precios-default-rtdb.firebaseio.com",
            projectId: "levantamiento-precios",
            storageBucket: "levantamiento-precios.firebasestorage.app",
            messagingSenderId: "877440962639",
            appId: "1:877440962639:web:2ca33f963dce920cb41a3a",
            measurementId: "G-YF5YTSRX1B"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database(app);

        let registros = [];

        function cargarDatos() {
            const ref = db.ref('registros');
            ref.on('value', (snapshot) => {
                registros = [];
                const datos = snapshot.val();

                if (datos) {
                    // Recorrer: registros/usuario/id/objeto
                    Object.keys(datos).forEach(usuario => {
                        const regs = datos[usuario];
                        Object.keys(regs).forEach(id => {
                            const reg = regs[id];
                            if (reg) {
                                registros.push({
                                    supermercado: reg.supermercado || 'N/A',
                                    marca: reg.marca || 'N/A',
                                    precio900: reg.precio900 || 0,
                                    precio15L: reg.precio15L || 0,
                                    precio3L: reg.precio3L || 0,
                                    stock900: reg.stock900 || 0,
                                    stock15L: reg.stock15L || 0,
                                    stock3L: reg.stock3L || 0,
                                    usuario: reg.usuario || usuario,
                                    fecha: reg.fecha || 'N/A'
                                });
                            }
                        });
                    });
                }

                actualizarUI();
            });
        }

        function actualizarUI() {
            // Estadísticas
            document.getElementById('totalRegistros').textContent = registros.length;
            document.getElementById('totalSupermercados').textContent = new Set(registros.map(r => r.supermercado)).size;
            document.getElementById('totalMarcas').textContent = new Set(registros.map(r => r.marca)).size;
            document.getElementById('totalUsuarios').textContent = new Set(registros.map(r => r.usuario)).size;

            // Tabla
            const tbody = document.getElementById('tabla');
            if (registros.length === 0) {
                tbody.innerHTML = '<tr class="empty"><td colspan="8">No hay registros</td></tr>';
                return;
            }

            tbody.innerHTML = registros.map(r => `
                <tr>
                    <td><strong>${r.supermercado}</strong></td>
                    <td><strong>${r.marca}</strong></td>
                    <td class="price">₡${r.precio900 || '-'}</td>
                    <td class="price">₡${r.precio15L || '-'}</td>
                    <td class="price">₡${r.precio3L || '-'}</td>
                    <td>${(r.stock900 || 0) + (r.stock15L || 0) + (r.stock3L || 0)}</td>
                    <td>${r.usuario}</td>
                    <td style="font-size: 12px;">${r.fecha}</td>
                </tr>
            `).join('');
        }

        function recargar() {
            cargarDatos();
        }

        function exportarExcel() {
            if (registros.length === 0) {
                alert('No hay datos para exportar');
                return;
            }

            try {
                const workbook = new ExcelJS.Workbook();

                // HOJA 1: CONSOLIDADO
                const ws1 = workbook.addWorksheet('Consolidado');
                
                const headers = ['Supermercado', 'Marca', '900ml (₡)', '1.5L (₡)', '3L (₡)', 'Stock Total', 'Usuario', 'Fecha'];
                ws1.addRow(headers);

                const headerStyle = {
                    font: { bold: true, color: { argb: 'FFFFFFFF' }, size: 12 },
                    fill: { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF7c3aed' } },
                    alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
                    border: { top: { style: 'thin' }, bottom: { style: 'thin' }, left: { style: 'thin' }, right: { style: 'thin' } }
                };

                ws1.getRow(1).eachCell(cell => {
                    cell.style = headerStyle;
                });

                registros.forEach(r => {
                    ws1.addRow([
                        r.supermercado,
                        r.marca,
                        r.precio900 || '-',
                        r.precio15L || '-',
                        r.precio3L || '-',
                        (r.stock900 || 0) + (r.stock15L || 0) + (r.stock3L || 0),
                        r.usuario,
                        r.fecha
                    ]);
                });

                ws1.columns = [
                    { width: 20 },
                    { width: 20 },
                    { width: 15 },
                    { width: 15 },
                    { width: 15 },
                    { width: 15 },
                    { width: 18 },
                    { width: 18 }
                ];

                ws1.eachRow((row, rowNumber) => {
                    if (rowNumber > 1) {
                        row.eachCell(cell => {
                            cell.border = { top: { style: 'thin' }, bottom: { style: 'thin' }, left: { style: 'thin' }, right: { style: 'thin' } };
                            cell.alignment = { horizontal: 'left', vertical: 'center' };
                        });
                    }
                });

                // HOJA 2: RESUMEN POR MARCA
                const ws2 = workbook.addWorksheet('Resumen por Marca');
                const marcas = {};
                registros.forEach(r => {
                    if (!marcas[r.marca]) {
                        marcas[r.marca] = { precios: [], supermercados: new Set() };
                    }
                    if (r.precio900) marcas[r.marca].precios.push(r.precio900);
                    if (r.precio15L) marcas[r.marca].precios.push(r.precio15L);
                    if (r.precio3L) marcas[r.marca].precios.push(r.precio3L);
                    marcas[r.marca].supermercados.add(r.supermercado);
                });

                const headerResumen = ['Marca', 'Promedio (₡)', 'Mín (₡)', 'Máx (₡)', 'Supermercados'];
                ws2.addRow(headerResumen);
                ws2.getRow(1).eachCell(cell => { cell.style = headerStyle; });

                Object.entries(marcas).forEach(([marca, data]) => {
                    if (data.precios.length > 0) {
                        ws2.addRow([
                            marca,
                            Math.round(data.precios.reduce((a,b)=>a+b)/data.precios.length),
                            Math.min(...data.precios),
                            Math.max(...data.precios),
                            data.supermercados.size
                        ]);
                    }
                });

                ws2.columns = [
                    { width: 20 },
                    { width: 15 },
                    { width: 15 },
                    { width: 15 },
                    { width: 15 }
                ];

                ws2.eachRow((row, rowNumber) => {
                    if (rowNumber > 1) {
                        row.eachCell(cell => {
                            cell.border = { top: { style: 'thin' }, bottom: { style: 'thin' }, left: { style: 'thin' }, right: { style: 'thin' } };
                            cell.alignment = { horizontal: 'center' };
                        });
                    }
                });

                // Descargar
                const fecha = new Date().toLocaleDateString('es-CR').replace(/\//g, '-');
                workbook.xlsx.writeBuffer().then(buffer => {
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Precios_${fecha}.xlsx`;
                    a.click();
                    window.URL.revokeObjectURL(url);
                });
            } catch (error) {
                alert('Error al exportar Excel: ' + error);
            }
        }

        cargarDatos();
    </script>
</body>
</html>
